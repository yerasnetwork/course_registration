<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой профиль</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; padding: 40px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 40px; }
        
        h2 { color: #2c3e50; margin-top: 0; text-align: center; margin-bottom: 30px; }
        
        .avatar-preview { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin: 0 auto 20px auto; display: block; border: 4px solid #667eea; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #34495e; }
        
        input[type="file"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        textarea { resize: vertical; min-height: 100px; }
        
        .btn-save { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1em; transition: opacity 0.2s; }
        .btn-save:hover { opacity: 0.9; }
        
        .btn-back { display: block; text-align: center; margin-top: 25px; text-decoration: none; color: #7f8c8d; font-weight: bold; }
        .btn-back:hover { color: #2c3e50; }
        
        /* Стилизация сообщений об успехе */
        .messages { list-style: none; padding: 0; margin-bottom: 20px; }
        .messages li { padding: 15px; border-radius: 8px; margin-bottom: 10px; color: white; text-align: center; }
        .messages .success { background-color: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <h2>👤 Настройки профиля</h2>
    
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <div>
        {% if user.profile.avatar %}
            <img src="{{ user.profile.avatar.url }}" class="avatar-preview" alt="Аватар">
        {% else %}
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="avatar-preview" alt="Нет фото">
        {% endif %}
    </div>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label>📷 Выберите новое фото:</label>
            {{ p_form.avatar }}
        </div>
        <div class="form-group">
            <label>✍️ Немного о себе:</label>
            {{ p_form.bio }}
        </div>
        <button type="submit" class="btn-save">💾 Сохранить изменения</button>
    </form>

    <a href="{% url 'course_list' %}" class="btn-back">← На главную</a>
</div>

</body>
</html>
